<!--
  아임웹 코드 위젯에 붙여넣기용 — 온라인 문의 폼
  문의 접수 → ewoo-hospital API → Firebase 상담일지 자동 등록
-->
<style>
.ewoo-inquiry { max-width:560px; margin:0 auto; font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif; color:#212121; }
.ewoo-inquiry * { box-sizing:border-box; }
.ewoo-inquiry .privacy-box { border:1px solid #ddd; border-radius:6px; padding:14px 16px; max-height:110px; overflow-y:auto; font-size:13px; line-height:1.7; color:#555; background:#fafafa; margin-bottom:10px; }
.ewoo-inquiry .agree-row { display:flex; align-items:center; gap:8px; margin-bottom:24px; font-size:14px; cursor:pointer; }
.ewoo-inquiry .agree-row input[type=checkbox] { width:18px; height:18px; accent-color:#009383; cursor:pointer; }
.ewoo-inquiry label.field-label { display:block; font-size:14px; font-weight:700; color:#333; margin-bottom:6px; }
.ewoo-inquiry label.field-label .req { color:#e53935; margin-left:2px; }
.ewoo-inquiry .field { margin-bottom:18px; }
.ewoo-inquiry input[type=text], .ewoo-inquiry input[type=tel], .ewoo-inquiry select, .ewoo-inquiry textarea {
  width:100%; border:1px solid #ddd; border-radius:6px; padding:11px 14px; font-size:15px; font-family:inherit; outline:none; transition:border 0.15s;
}
.ewoo-inquiry input:focus, .ewoo-inquiry select:focus, .ewoo-inquiry textarea:focus { border-color:#009383; }
.ewoo-inquiry textarea { resize:vertical; min-height:120px; }
.ewoo-inquiry select { appearance:auto; background:#fff; }
.ewoo-inquiry .submit-btn {
  width:100%; padding:14px; border:none; border-radius:8px; background:#009383; color:#fff;
  font-size:16px; font-weight:700; cursor:pointer; transition:background 0.15s; letter-spacing:0.5px;
}
.ewoo-inquiry .submit-btn:hover { background:#00796b; }
.ewoo-inquiry .submit-btn:disabled { background:#aaa; cursor:not-allowed; }
.ewoo-inquiry .msg { text-align:center; padding:16px; border-radius:8px; font-size:15px; margin-top:10px; }
.ewoo-inquiry .msg.ok { background:#e8f5e9; color:#2e7d32; }
.ewoo-inquiry .msg.err { background:#ffebee; color:#c62828; }
</style>

<div class="ewoo-inquiry" id="ewooInquiry">
  <!-- 개인정보 수집 동의 -->
  <div class="privacy-box">
이우병원은 온라인 문의 접수를 위하여 아래와 같이 개인정보를 수집·이용합니다.<br><br>
1. 수집 항목: 이름, 연락처<br>
2. 수집 목적: 문의 접수 및 상담 회신<br>
3. 보유 기간: 상담 완료 후 1년간 보관 후 파기<br>
4. 동의를 거부할 권리가 있으며, 거부 시 문의 접수가 불가합니다.<br><br>
※ 위 개인정보 취급에 관한 자세한 사항은 병원 개인정보 취급방침을 참고하시기 바랍니다.
  </div>
  <label class="agree-row">
    <input type="checkbox" id="ewooPrivacy">
    개인정보 수집 및 이용에 동의합니다.
  </label>

  <!-- 입력 필드 -->
  <div class="field">
    <label class="field-label">이름 <span class="req">*</span></label>
    <input type="text" id="ewooName" placeholder="이름을 입력하세요">
  </div>
  <div class="field">
    <label class="field-label">연락처 <span class="req">*</span></label>
    <input type="tel" id="ewooPhone" placeholder="010-0000-0000">
  </div>
  <div class="field">
    <label class="field-label">문의유형</label>
    <select id="ewooType">
      <option value="medical">진료문의</option>
      <option value="admission">입퇴원문의</option>
      <option value="etc">기타문의</option>
    </select>
  </div>
  <div class="field">
    <label class="field-label">문의내용 <span class="req">*</span></label>
    <textarea id="ewooContent" placeholder="문의하실 내용을 입력하세요"></textarea>
  </div>

  <button class="submit-btn" id="ewooSubmit" onclick="submitEwooInquiry()">문의접수</button>
  <div id="ewooMsg"></div>
</div>

<script>
function submitEwooInquiry() {
  var name = document.getElementById('ewooName').value.trim();
  var phone = document.getElementById('ewooPhone').value.trim();
  var inquiryType = document.getElementById('ewooType').value;
  var content = document.getElementById('ewooContent').value.trim();
  var privacy = document.getElementById('ewooPrivacy').checked;
  var btn = document.getElementById('ewooSubmit');
  var msg = document.getElementById('ewooMsg');

  msg.className = 'msg'; msg.textContent = '';

  if (!privacy) { msg.className = 'msg err'; msg.textContent = '개인정보 수집 및 이용에 동의해주세요.'; return; }
  if (!name) { msg.className = 'msg err'; msg.textContent = '이름을 입력해주세요.'; return; }
  if (!phone) { msg.className = 'msg err'; msg.textContent = '연락처를 입력해주세요.'; return; }
  if (!content) { msg.className = 'msg err'; msg.textContent = '문의내용을 입력해주세요.'; return; }

  btn.disabled = true; btn.textContent = '접수 중...';

  fetch('https://ewoo-hospital.vercel.app/api/inquiry', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, phone: phone, inquiryType: inquiryType, content: content, privacyAgreed: true })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (res.ok) {
      msg.className = 'msg ok';
      msg.textContent = '문의가 접수되었습니다. 빠른 시일 내에 연락드리겠습니다.';
      document.getElementById('ewooName').value = '';
      document.getElementById('ewooPhone').value = '';
      document.getElementById('ewooContent').value = '';
      document.getElementById('ewooPrivacy').checked = false;
    } else {
      msg.className = 'msg err';
      msg.textContent = res.data.error || '접수에 실패했습니다.';
    }
    btn.disabled = false; btn.textContent = '문의접수';
  })
  .catch(function() {
    msg.className = 'msg err';
    msg.textContent = '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    btn.disabled = false; btn.textContent = '문의접수';
  });
}
</script>
